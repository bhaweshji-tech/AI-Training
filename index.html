</head>

<body class="bg-slate-950 text-white min-h-screen">

```
<!-- Header -->
<header class="bg-gradient-to-r from-slate-900 via-gray-900 to-black py-16">
    <div class="max-w-7xl mx-auto px-6 text-center">
        <h1 class="text-5xl md:text-6xl font-bold mb-4">
            Welcome to GitHub
        </h1>

        <p class="text-slate-300 text-xl">
            Learn GitHub, Git, HTML, Tailwind CSS and Modern Development Technologies
        </p>
    </div>
</header>

<!-- Content -->
<main class="max-w-7xl mx-auto px-6 py-12">

    <div class="flex items-center justify-between mb-8">
        <h2 class="text-3xl font-bold">
            Training Catalog
        </h2>

        <button
            onclick="loadTrainingData()"
            class="bg-blue-600 hover:bg-blue-700 px-5 py-2 rounded-lg transition">
            Refresh
        </button>
    </div>

    <div id="loading" class="text-center text-slate-400 text-lg">
        Loading training modules...
    </div>

    <div id="error" class="hidden text-center text-red-400 mb-6"></div>

    <div
        id="training-container"
        class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
    </div>

</main>

<script>

    const SUPABASE_URL =
        "https://gsdblteofsongnjdjhpc.supabase.co";

    const SUPABASE_ANON_KEY =
        "sb_publishable_u9dNq32zPDAFOO415PArvQ_ljzEEiaC";

    const supabase =
        window.supabase.createClient(
            SUPABASE_URL,
            SUPABASE_ANON_KEY
        );

    async function loadTrainingData() {

        const loading =
            document.getElementById("loading");

        const errorDiv =
            document.getElementById("error");

        const container =
            document.getElementById("training-container");

        loading.style.display = "block";
        errorDiv.classList.add("hidden");
        container.innerHTML = "";

        try {

            const { data, error } = await supabase
                .from("trainingdata")
                .select("*")
                .order("id", { ascending: true });

            if (error) {
                throw error;
            }

            loading.style.display = "none";

            if (!data || data.length === 0) {

                container.innerHTML = `
                    <div class="col-span-full text-center text-slate-400 text-xl">
                        No training records found.
                    </div>
                `;

                return;
            }

            data.forEach(item => {

                const card = document.createElement("div");

                card.className =
                    "bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl hover:border-blue-500 hover:-translate-y-1 transition duration-300";

                card.innerHTML = `
                    <div class="mb-4">
                        <span class="bg-blue-600 text-white px-3 py-1 rounded-full text-sm">
                            ${item.tech || ''}
                        </span>
                    </div>

                    <h3 class="text-2xl font-bold mb-3">
                        ${item.title || ''}
                    </h3>

                    <p class="text-slate-300 mb-6">
                        ${item.desc || ''}
                    </p>

                    <a
                        href="${item.link || '#'}"
                        target="_blank"
                        class="inline-block bg-white text-slate-900 px-5 py-2 rounded-lg font-semibold hover:bg-blue-500 hover:text-white transition">
                        Learn More
                    </a>
                `;

                container.appendChild(card);
            });

        }
        catch(err) {

            loading.style.display = "none";

            errorDiv.classList.remove("hidden");

            errorDiv.innerHTML =
                "Error loading data: " + err.message;
        }
    }

    loadTrainingData();

    setInterval(loadTrainingData, 30000);

</script>
```

</body>
</html>
