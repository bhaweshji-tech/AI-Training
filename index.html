<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to GitHub</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: Inter, system-ui, sans-serif;
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-gray-900 to-black flex items-center justify-center">

    <div class="text-center p-10 bg-white/10 backdrop-blur-lg rounded-3xl shadow-2xl border border-white/20">
        <h1 class="text-5xl md:text-7xl font-extrabold text-white mb-4">
            Welcome to GitHub
        </h1>

        <p class="text-slate-300 text-lg md:text-xl">
            Your code, your projects, your future.
        </p>

        <button class="mt-8 px-8 py-3 bg-white text-slate-900 font-semibold rounded-xl hover:scale-105 transition-transform duration-300 shadow-lg">
            Get Started
        </button>
    </div>

</body>
</html>
