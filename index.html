<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>AI Training Portal - Developer Edition</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="flex flex-col min-h-screen selection:bg-rose-500 selection:text-white">
    
    <canvas id="bg-canvas"></canvas>

    <header id="shared-header"></header>

    <main class="flex-grow p-6 md:p-12 max-w-7xl mx-auto w-full relative z-10">
        <header class="mb-12 flex flex-col md:flex-row justify-between items-start md:items-center gap-6 p-6 rounded-xl glass-panel border-l-4 border-rose-600 animate-fade-in-up">
            <div class="bg-black/30 p-5 rounded-lg backdrop-blur-md">
                <h2 class="text-2xl md:text-3xl text-white mb-2 uppercase tracking-widest font-bold font-[Geist]">Explore Training Courses</h2>
                <p class="text-sm md:text-base text-white/70 font-medium font-[Inter]">Read real reviews or login to share your training experience.</p>
            </div>
            <div class="flex gap-4 items-center">
                <div id="status" class="text-xs font-mono tracking-widest text-rose-400 uppercase bg-black/40 border border-white/10 px-4 py-2 rounded">
                    Connecting...
                </div>
            </div>
        </header>

        <div id="courseGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <div id="shared-footer"></div>

    <script type="module" src="js/app.js"></script>

<div id="design-tunnel" style="position: fixed; bottom: 10px; right: 10px; z-index: 9999; background: #0f172a; padding: 15px; border: 1px solid #334155; border-radius: 8px; display: none;">
  <h4 style="color: #fff; margin: 0 0 8px 0; font-size: 12px;">Stitch Design Sync</h4>
  <textarea id="stitch-box" placeholder="Paste Stitch code here..." style="width: 200px; height: 60px; background: #1e293b; color: #fff; border: 1px solid #475569; font-size: 11px; border-radius: 4px; padding: 5px;"></textarea>
  <button id="sync-btn" style="display: block; width: 100%; margin-top: 5px; background: #2563eb; color: #fff; border: none; padding: 5px; border-radius: 4px; cursor: pointer; font-size: 11px;">Update Website Theme</button>
</div>

<script type="module">
  import { supabaseClient, ADMIN_EMAIL, auth } from './js/config.js';

  // Only show the sync panel if you are logged in as the admin
  auth.onAuthStateChanged((user) => {
    if (user && user.email === ADMIN_EMAIL) {
      document.getElementById('design-tunnel').style.display = 'block';
    }
  });

  document.getElementById('sync-btn').addEventListener('click', async () => {
    const rawInput = document.getElementById('stitch-box').value;
    if (!rawInput) return alert("Please paste the Stitch clipboard code first!");

    try {
      let tokens = {};
      
      // Parse JSON if Stitch copies it as an object, otherwise handle raw text lines
      try {
        tokens = JSON.parse(rawInput);
      } catch (e) {
        // Fallback for line-by-line token strings
        rawInput.split('\n').forEach(line => {
          const parts = line.split(':');
          if (parts.length >= 2) {
            const key = parts[0].replace(/[^a-zA-Z0-9-]/g, '').trim().toLowerCase();
            const value = parts.slice(1).join(':').replace(/['";]/g, '').trim();
            if (key && value) tokens[key] = value;
          }
        });
      }

      const upsertRows = Object.entries(tokens).map(([key, value]) => ({
        key: key.replace(/^--/, ''), // strip CSS dashes if present
        value: String(value)
      }));

      if (upsertRows.length === 0) throw new Error("No readable styling properties found.");

      // Push everything to Supabase instantly
      const { error } = await supabaseClient.from('theme_settings').upsert(upsertRows, { onConflict: 'key' });
      if (error) throw error;

      alert(`🚀 Success! ${upsertRows.length} design features applied. Refreshing page...`);
      window.location.reload();

    } catch (err) {
      alert("Execution error: " + err.message);
    }
  });
</script>    
</body>
</html>
