<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Training Portal</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Your shared stylesheet -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-slate-900 text-white min-h-screen">

    <!-- Header -->
    <header class="bg-slate-800 shadow-md">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">

            <h1 class="text-3xl font-bold">
                Training Portal
            </h1>

            <nav class="space-x-6">
                <a href="index.html" class="hover:text-blue-400">Home</a>
                <a href="about.html" class="hover:text-blue-400">About</a>
                <a href="contact.html" class="hover:text-blue-400">Contact</a>
            </nav>

        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-6 py-10">

        <!-- Title + Refresh Button -->
        <div class="flex justify-between items-center mb-6">

            <h2 class="text-3xl font-bold">
                Training Data
            </h2>

            <button
                onclick="loadData()"
                class="bg-blue-600 px-4 py-2 rounded-lg hover:bg-blue-700 transition">

                Refresh

            </button>

        </div>

        <!-- Status -->
        <div id="status" class="text-slate-400 mb-6">
            Ready.
        </div>

        <!-- Training Cards -->
        <div id="cards" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">

            <!-- Sample Card -->
            <div class="bg-slate-800 rounded-xl p-6 shadow-lg">

                <h3 class="text-xl font-semibold mb-2">
                    Sample Training
                </h3>

                <p class="text-slate-300">
                    Your training cards will appear here once loaded by JavaScript.
                </p>

            </div>

        </div>

    </main>

    <!-- Footer -->
    <footer class="bg-slate-800 mt-12">
        <div class="max-w-7xl mx-auto px-6 py-5 text-center text-slate-400">

            © 2026 Training Portal

        </div>
    </footer>

    <!-- Shared JavaScript -->
    <script src="js/app.js"></script>

</body>
</html>
