<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Training Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col justify-between">

  <header id="shared-header" class="bg-slate-900 border-b border-slate-800 sticky top-0 z-50"></header>

  <main class="max-w-7xl mx-auto px-6 py-10 flex-grow w-full">
    <div class="text-center py-8">
      <h1 class="text-4xl font-extrabold tracking-tight sm:text-5xl">Explore Training Courses</h1>
      <p class="text-slate-400 mt-2">Read real reviews or login to share your training experience.</p>
    </div>

    <div id="status" class="text-sm text-center text-blue-400 my-4 font-mono">Connecting...</div>
    <div id="cards" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8 mt-6"></div>
  </main>

  <footer id="shared-footer" class="border-t border-slate-900 bg-slate-950 py-6"></footer>

  <script type="module">
    import { auth, supabaseClient, injectLayout } from "./js/auth.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    let globalUser = null;

    onAuthStateChanged(auth, (user) => {
      globalUser = user;
      injectLayout(user);
      loadDashboardData();
    });

    async function loadDashboardData() {
      const status = document.getElementById("status");
      const cardsContainer = document.getElementById("cards");
      cardsContainer.innerHTML = "";
      status.innerText = "Fetching real-time records...";

      // Fetch Courses
      const { data: courses, error: courseErr } = await supabaseClient.from("trainingdata").select("*").order("id", { ascending: true });
      // Fetch Reviews
      const { data: reviews, error: reviewErr } = await supabaseClient.from("reviews").select("*").order("created_at", { ascending: false });

      if (courseErr) {
        status.innerText = "Error syncing data: " + courseErr.message;
        return;
      }
      if (!courses || courses.length === 0) {
        status.innerText = "No training entries found.";
        return;
      }

      status.innerText = `Displaying ${courses.length} courses`;

      courses.forEach(course => {
        const courseReviews = reviews ? reviews.filter(r => r.course_id === course.id) : [];
        const card = document.createElement("div");
        card.className = "bg-slate-900 border border-slate-800 rounded-2xl p-6 flex flex-col justify-between hover:border-slate-700 transition";

        let reviewsHTML = courseReviews.map(r => `
          <div class="bg-slate-950/60 p-3 rounded-xl border border-slate-800/40 text-xs text-slate-300">
            <div class="flex items-center space-x-2 mb-1.5">
              <img src="${r.user_photo || 'https://via.placeholder.com/150'}" class="w-4 h-4 rounded-full">
              <span class="font-bold text-slate-200">${r.user_name}</span>
            </div>
            <p class="italic">"${r.review_text}"</p>
          </div>
        `).join("");

        card.innerHTML = `
          <div>
            <span class="text-xs bg-blue-950 text-blue-400 border border-blue-900/50 px-2.5 py-1 rounded-full font-semibold">${course.tech || "General"}</span>
            <h3 class="text-xl font-bold mt-3 text-slate-100">${course.title || "Untitled course"}</h3>
            <p class="text-slate-400 text-sm mt-1 mb-4 leading-relaxed">${course.desc || ""}</p>
            <a href="${course.link || "#"}" target="_blank" class="text-xs text-blue-400 font-medium hover:underline">Resource Link →</a>
            
            <div class="mt-6 border-t border-slate-800/80 pt-4">
              <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Visitor Reviews (${courseReviews.length})</h4>
              <div class="space-y-2 max-h-40 overflow-y-auto pr-1">${reviewsHTML || '<p class="text-xs text-slate-600 italic">No reviews yet.</p>'}</div>
            </div>
          </div>

          ${globalUser ? `
            <div class="mt-4 pt-3 border-t border-slate-800/50">
              <div class="flex space-x-2">
                <input type="text" id="input-${course.id}" placeholder="Write a public review..." class="bg-slate-950 border border-slate-800 text-xs rounded-lg px-3 py-2 flex-grow focus:outline-none focus:border-blue-500 text-slate-200">
                <button data-course-id="${course.id}" class="btn-submit-review bg-blue-600 hover:bg-blue-700 text-white text-xs font-medium px-3 py-2 rounded-lg transition">Post</button>
              </div>
            </div>
          ` : ''}
        `;
        cardsContainer.appendChild(card);
      });

      // Handle Review Form Submissions
      document.querySelectorAll(".btn-submit-review").forEach(btn => {
        btn.addEventListener("click", async (e) => {
          const cid = e.target.getAttribute("data-course-id");
          const inputField = document.getElementById(`input-${cid}`);
          const text = inputField.value.trim();

          if (!text) return;

          const { error } = await supabaseClient.from("reviews").insert([{
            course_id: parseInt(cid),
            user_email: globalUser.email,
            user_name: globalUser.displayName,
            user_photo: globalUser.photoURL,
            review_text: text
          }]);

          if (error) {
            alert("Error posting review: " + error.message);
          } else {
            inputField.value = "";
            loadDashboardData(); // Refresh list instantly
          }
        });
      });
    }
  </script>
</body>
</html>
