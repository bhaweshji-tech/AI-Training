<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Training Portal</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body class="bg-slate-950 text-white min-h-screen">

  <!-- HEADER -->
  <header class="bg-gradient-to-r from-slate-900 via-gray-900 to-black py-14 text-center">
    <h1 class="text-5xl font-bold">Welcome to AI Training Portal</h1>
    <p class="text-slate-300 mt-3">Live data from Supabase</p>
  </header>

  <!-- CONTENT -->
  <main class="max-w-7xl mx-auto px-6 py-10">

    <div class="flex justify-between items-center mb-6">
      <h2 class="text-3xl font-bold">Training Data</h2>

      <button onclick="loadData()"
        class="bg-blue-600 px-4 py-2 rounded-lg hover:bg-blue-700 transition">
        Refresh
      </button>
    </div>

    <div id="status" class="text-slate-400 mb-6">
      Loading data...
    </div>

    <div id="cards" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

  </main>

  <script>
    // ✅ Supabase Config
    const SUPABASE_URL = "https://gsdblteofsongnjdjhpc.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_u9dNq32zPDAFOO415PArvQ_ljzEEiaC";

    // ✅ IMPORTANT: use supabaseClient (NOT supabase)
    const supabaseClient = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY
    );

    // Load data from Supabase
    async function loadData() {

      const status = document.getElementById("status");
      const cards = document.getElementById("cards");

      status.innerText = "Loading...";
      cards.innerHTML = "";

      const { data, error } = await supabaseClient
        .from("trainingdata")
        .select("*")
        .order("id", { ascending: true });

      if (error) {
        status.innerText = "Error: " + error.message;
        return;
      }

      if (!data || data.length === 0) {
        status.innerText = "No data found";
        return;
      }

      status.innerText = `Loaded ${data.length} records`;

      data.forEach(item => {
        const div = document.createElement("div");

        div.className =
          "bg-slate-900 border border-slate-800 p-6 rounded-2xl hover:border-blue-500 transition";

        div.innerHTML = `
          <span class="text-xs bg-blue-600 px-3 py-1 rounded-full">
            ${item.tech || ""}
          </span>

          <h3 class="text-xl font-bold mt-4">
            ${item.title || ""}
          </h3>

          <p class="text-slate-300 mt-2 mb-4">
            ${item.desc || ""}
          </p>

          <a href="${item.link || "#"}" target="_blank"
             class="text-blue-400 hover:underline">
            Visit Link →
          </a>
        `;

        cards.appendChild(div);
      });
    }

    // Auto load
    loadData();
  </script>

</body>
</html>
