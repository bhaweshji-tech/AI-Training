<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Research Lab - Universal Mind Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>

<body class="min-h-screen flex flex-col bg-[#020617] text-[#f8fafc]">

    <main class="flex-grow max-w-7xl mx-auto px-6 py-12 w-full">

            <div>

                    Connecting...
                </div>

        <div id="courseGrid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
