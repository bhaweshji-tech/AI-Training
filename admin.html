<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Workspace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col justify-between">

  <header id="shared-header" class="bg-slate-900 border-b border-slate-800 sticky top-0 z-50"></header>

  <main class="max-w-7xl mx-auto px-6 py-10 flex-grow w-full">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center border-b border-slate-800 pb-6 mb-8 space-y-4 md:space-y-0">
      <div>
        <h2 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-red-400 to-orange-400">Owner Workspace</h2>
        <p class="text-xs text-slate-400 mt-1">Global platform course manager and visitor review control center.</p>
      </div>
      <button onclick="toggleForm()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium px-4 py-2 rounded-xl text-sm transition">
        + Add New Course
      </button>
    </div>

    <div id="course-form-container" class="hidden bg-slate-900 border border-slate-800 p-6 rounded-2xl mb-8 max-w-xl shadow-xl">
      <h3 id="form-title" class="text-lg font-bold mb-4 text-slate-200">Create New Course Entry</h3>
      <input type="hidden" id="form-course-id">
      <div class="space-y-4 text-sm">
        <div>
          <label class="block text-slate-400 mb-1">Technology Flag</label>
          <input type="text" id="form-tech" placeholder="e.g. Python, React, PyTorch" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2.5 text-slate-100 focus:outline-none focus:border-blue-500">
        </div>
        <div>
          <label class="block text-slate-400 mb-1">Course Title</label>
          <input type="text" id="form-title-input" placeholder="Enter course name" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2.5 text-slate-100 focus:outline-none focus:border-blue-500">
        </div>
        <div>
          <label class="block text-slate-400 mb-1">Short Summary Description</label>
          <textarea id="form-desc" rows="3" placeholder="Provide overview text..." class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2.5 text-slate-100 focus:outline-none focus:border-blue-500"></textarea>
        </div>
        <div>
          <label class="block text-slate-400 mb-1">Destination Web Link</label>
          <input type="text" id="form-link" placeholder="https://..." class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2.5 text-slate-100 focus:outline-none focus:border-blue-500">
        </div>
        <div class="flex space-x-3 pt-2">
          <button onclick="saveCourse()" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg text-xs font-semibold">Commit Changes</button>
          <button onclick="toggleForm()" class="bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg text-xs font-semibold text-slate-300">Cancel</button>
        </div>
      </div>
    </div>

    <div id="admin-status" class="text-xs text-amber-500 font-mono mb-4">Verifying system credentials...</div>
    <div id="admin-cards" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
  </main>

  <footer id="shared-footer" class="border-t border-slate-900 bg-slate-950 py-6"></footer>

  <script type="module">
    import { auth, supabaseClient, injectLayout, ADMIN_EMAIL } from "./js/auth.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    onAuthStateChanged(auth, (user) => {
      if (!user || user.email !== ADMIN_EMAIL) {
        // Kick out immediately if user is not the explicit Admin owner
        window.location.href = "index.html"; 
        return;
      }
      injectLayout(user);
      loadAdminWorkspace();
    });

    window.toggleForm = function() {
      const container = document.getElementById("course-form-container");
      container.classList.toggle("hidden");
      if(container.classList.contains("hidden")) {
        document.getElementById("form-course-id").value = "";
        document.getElementById("form-tech").value = "";
        document.getElementById("form-title-input").value = "";
        document.getElementById("form-desc").value = "";
        document.getElementById("form-link").value = "";
        document.getElementById("form-title").innerText = "Create New Course Entry";
      }
    }

    async function loadAdminWorkspace() {
      const status = document.getElementById("admin-status");
      const container = document.getElementById("admin-cards");
      container.innerHTML = "";

      const { data: courses, error: cErr } = await supabaseClient.from("trainingdata").select("*").order("id", { ascending: true });
      const { data: reviews, error: rErr } = await supabaseClient.from("reviews").select("*").order("created_at", { ascending: false });

      if (cErr) { status.innerText = "Error syncing database state: " + cErr.message; return; }
      status.innerText = `Live Admin: Management mapping loaded (${courses.length} items total)`;

      courses.forEach(course => {
        const courseReviews = reviews ? reviews.filter(r => r.course_id === course.id) : [];
        const card = document.createElement("div");
        card.className = "bg-slate-900 border border-slate-800 rounded-2xl p-6 flex flex-col justify-between";
        
        let revsHTML = courseReviews.map(r => `
          <div class="bg-slate-950 p-2.5 rounded-lg border border-slate-800/60 text-[11px] flex justify-between items-start">
            <div class="pr-2">
              <span class="text-blue-400 font-bold">${r.user_name}:</span> <span class="text-slate-300 italic">"${r.review_text}"</span>
            </div>
            <button onclick="deleteReview(${r.id})" class="text-red-500 hover:text-red-400 font-semibold shrink-0">✕</button>
          </div>
        `).join("");

        card.innerHTML = `
          <div>
            <div class="flex justify-between items-start">
              <span class="text-xs bg-slate-950 border border-slate-800 text-slate-300 px-2 py-0.5 rounded-md font-mono">${course.tech || "General"}</span>
              <div class="space-x-2">
                <button onclick="editCourse(${JSON.stringify(course).replace(/"/g, '&quot;')})" class="text-xs text-amber-400 hover:underline">Edit</button>
                <button onclick="deleteCourse(${course.id})" class="text-xs text-red-400 hover:underline">Delete</button>
              </div>
            </div>
            <h3 class="text-lg font-bold mt-3">${course.title}</h3>
            <p class="text-xs text-slate-400 mt-1 mb-4 line-clamp-3">${course.desc || ''}</p>
            
            <div class="mt-4 pt-4 border-t border-slate-800">
              <h4 class="text-[11px] uppercase tracking-wider font-bold text-slate-500 mb-2">Global User Reviews (${courseReviews.length})</h4>
              <div class="space-y-1.5 max-h-36 overflow-y-auto">${revsHTML || '<p class="text-xs text-slate-700 italic">No reviews yet.</p>'}</div>
            </div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    window.editCourse = function(course) {
      document.getElementById("form-course-id").value = course.id;
      document.getElementById("form-tech").value = course.tech;
      document.getElementById("form-title-input").value = course.title;
      document.getElementById("form-desc").value = course.desc;
      document.getElementById("form-link").value = course.link;
      document.getElementById("form-title").innerText = "Modify Existing Course Entry";
      document.getElementById("course-form-container").classList.remove("hidden");
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    window.saveCourse = function() {
      const id = document.getElementById("form-course-id").value;
      const tech = document.getElementById("form-tech").value;
      const title = document.getElementById("form-title-input").value;
      const desc = document.getElementById("form-desc").value;
      const link = document.getElementById("form-link").value;

      if(!title) { alert("Title field required!"); return; }

      const payload = { tech, title, desc, link };

      let operation;
      if (id) {
        operation = supabaseClient.from("trainingdata").update(payload).eq("id", id);
      } else {
        operation = supabaseClient.from("trainingdata").insert([payload]);
      }

      operation.then(({ error }) => {
        if(error) alert(error.message);
        else { toggleForm(); loadAdminWorkspace(); }
      });
    }

    window.deleteCourse = function(id) {
      if(!confirm("Permanently erase this course mapping along with its connected review chains?")) return;
      supabaseClient.from("trainingdata").delete().eq("id", id).then(() => loadAdminWorkspace());
    }

    window.deleteReview = function(id) {
      if(!confirm("Moderate and permanently clear this user review statement?")) return;
      supabaseClient.from("reviews").delete().eq("id", id).then(() => loadAdminWorkspace());
    }

    window.loadAdminWorkspace = loadAdminWorkspace;
  </script>
</body>
</html>
